<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Robot Krallığı</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:-apple-system,sans-serif;}
canvas{display:block;margin:0 auto;background:#000;}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;}
#hud{display:flex;gap:12px;align-items:center;padding:10px 16px;background:linear-gradient(180deg,#000a,transparent);}
.bar-wrap{width:140px;}
.bar-lbl{font-size:10px;color:#aaa;font-weight:700;margin-bottom:2px;}
.bar-bg{background:#1a1a2e;border-radius:4px;height:10px;overflow:hidden;border:1px solid #333;}
.bar-fill{height:10px;border-radius:4px;transition:width 0.2s;}
#hp-fill{background:linear-gradient(90deg,#c0392b,#e74c3c);}
#mp-fill{background:linear-gradient(90deg,#1a5276,#3498db);}
#xp-fill{background:linear-gradient(90deg,#4a235a,#8e44ad);}
.stat{font-size:11px;color:#fff;font-weight:700;background:#1a1a2e88;padding:4px 8px;border-radius:6px;border:1px solid #333;}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.popup{background:#000c;border:1px solid #f1c40f;border-radius:12px;padding:16px 24px;color:#fff;text-align:center;animation:popIn 0.3s ease;display:none;}
@keyframes popIn{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
#controls{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:#555;text-align:center;pointer-events:none;}
#levelup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#1a0a2a,#0a0a1a);border:2px solid #8e44ad;border-radius:16px;padding:24px;color:#fff;text-align:center;display:none;z-index:100;min-width:280px;}
#levelup h2{color:#f1c40f;font-size:22px;margin-bottom:10px;}
#levelup .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.sk-btn{background:#1a1a2e;border:1px solid #444;border-radius:8px;padding:10px;cursor:pointer;color:#fff;font-size:12px;transition:all 0.15s;pointer-events:all;}
.sk-btn:hover{border-color:#8e44ad;background:#2a1a3a;}
#gameover{position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;}
#gameover h1{color:#e74c3c;font-size:48px;font-weight:900;margin-bottom:16px;}
#gameover p{color:#aaa;font-size:16px;margin-bottom:24px;}
#gameover button{background:#2a52cc;color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
#shop-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a0a1a;border:1px solid #2a52cc;border-radius:16px;padding:20px;width:320px;display:none;z-index:150;color:#fff;}
#shop-panel h3{color:#e67e22;font-size:16px;margin-bottom:12px;text-align:center;}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #2a2a4a;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;pointer-events:all;}
.shop-item:hover{border-color:#e67e22;background:#1a0f0a;}
.shop-item .price{color:#e67e22;font-weight:700;font-size:13px;margin-left:auto;}
.shop-close{width:100%;background:#333;color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer;margin-top:8px;font-size:13px;pointer-events:all;}
#floating-texts{position:fixed;top:0;left:0;pointer-events:none;width:100%;height:100%;}
.float-txt{position:absolute;font-weight:900;animation:floatUp 1s ease forwards;text-shadow:0 2px 4px #000;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-80px) scale(0.8);}}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="hud">
    <div style="font-size:20px;" id="hero-icon">🧙</div>
    <div>
      <div class="bar-wrap">
        <div class="bar-lbl">❤️ HP <span id="hp-txt">100/100</span></div>
        <div class="bar-bg"><div class="bar-fill" id="hp-fill" style="width:100%"></div></div>
      </div>
    </div>
    <div>
      <div class="bar-wrap">
        <div class="bar-lbl">💧 MP <span id="mp-txt">50/50</span></div>
        <div class="bar-bg"><div class="bar-fill" id="mp-fill" style="width:100%"></div></div>
      </div>
    </div>
    <div>
      <div class="bar-wrap">
        <div class="bar-lbl">⭐ XP</div>
        <div class="bar-bg"><div class="bar-fill" id="xp-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="stat">Sv.<span id="lv-txt">1</span></div>
    <div class="stat">💰<span id="gold-txt">0</span></div>
    <div class="stat">📍Bölüm <span id="ch-txt">1</span>/250</div>
    <div class="stat" style="cursor:pointer;pointer-events:all;" onclick="openShop()">🛒</div>
  </div>
</div>

<div id="floating-texts"></div>

<div id="levelup">
  <h2>⬆️ SEVİYE ATLADI!</h2>
  <p id="lv-msg" style="color:#aaa;font-size:13px;margin-bottom:8px;"></p>
  <div class="skills-grid" id="skills-grid"></div>
  <button class="sk-btn" style="width:100%;margin-top:4px;" onclick="closeLevelUp()">Devam Et →</button>
</div>

<div id="gameover" style="display:flex;display:none;">
  <h1>💀 ÖLDÜN</h1>
  <p id="go-msg">Ama bu seferi daha iyi yapacaksın!</p>
  <button onclick="respawn()">🔄 Yeniden Başla</button>
</div>

<div id="shop-panel">
  <h3>🛒 Silah & Zırh Mağazası</h3>
  <div id="shop-items"></div>
  <button class="shop-close" onclick="closeShop()">✕ Kapat</button>
</div>

<div id="controls">WASD / Ok Tuşları: Hareket & Zıpla | Sol Tık: Saldır | Sağ Tık: Büyü | E: Mağaza</div>

<script>
var C=document.getElementById('c');
var ctx=C.getContext('2d');

// Ekran boyutu
function resize(){C.width=Math.min(window.innerWidth,900);C.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// ── OYUNCU ──
var P={
  x:200,y:300,w:36,h:48,
  vx:0,vy:0,
  onGround:false,
  hp:100,maxHp:100,
  mp:50,maxMp:50,
  xp:0,xpNext:100,
  level:1,gold:100,
  atk:18,def:4,
  char:0, // 0=büyücü,1=savaşçı,2=okçu,3=şövalye
  skills:[], skillPoints:0,
  equip:{w:null,a:null},
  invincible:0,
  chapter:1,
  potions:3,
  cosm:[],
  badges:[],rparts:[],
  kc:0,bc:0,ws:0,mws:0
};
var CHARS=[
  {emoji:'🧙',color:'#a29bfe',name:'Büyücü'},
  {emoji:'⚔️',color:'#e17055',name:'Savaşçı'},
  {emoji:'🏹',color:'#55efc4',name:'Okçu'},
  {emoji:'🛡️',color:'#74b9ff',name:'Şövalye'}
];

// ── FİZİK ──
var GRAVITY=0.55;
var JUMP=-13;
var SPEED=4.5;
var keys={};
window.addEventListener('keydown',function(e){keys[e.code]=true;if(e.code==='KeyE')openShop();if(e.code==='Space')e.preventDefault();});
window.addEventListener('keyup',function(e){keys[e.code]=false;});

// ── DÜNYA ──
var CAM={x:0,y:0};
var platforms=[];
var enemies=[];
var particles=[];
var projectiles=[];
var collectibles=[];
var chapter=1;
var chapterTimer=0;
var chapterEnemies=0;
var shopOpen=false;
var lvlUpOpen=false;
var dead=false;

// PLATFORM TİPLERİ
function genLevel(ch){
  platforms=[];enemies=[];collectibles=[];projectiles=[];
  var W=C.width;var base=C.height-60;
  // Zemin
  platforms.push({x:-200,y:base,w:4000,h:60,color:'#1a1a2e',type:'ground'});
  // Platformlar
  var px=300;
  for(var i=0;i<18;i++){
    var pw=80+Math.random()*120;
    var py=base-80-Math.random()*180;
    platforms.push({x:px,y:py,w:pw,h:14,color:i%3===0?'#2a1a4a':'#1a2a4a',type:'platform'});
    px+=pw+60+Math.random()*80;
    // Bazı platformlarda yüzen ödül
    if(Math.random()>0.6) collectibles.push({x:px-pw/2,y:py-30,type:Math.random()>0.5?'gold':'hp',collected:false});
  }
  // Düşmanlar
  var eCount=3+Math.floor(ch*1.5);
  chapterEnemies=eCount;
  var ETYPES=getEnemyTypes(ch);
  for(var j=0;j<eCount;j++){
    var et=ETYPES[Math.floor(Math.random()*ETYPES.length)];
    enemies.push({
      x:400+j*220+Math.random()*100,
      y:base-et.h,
      w:et.w,h:et.h,
      vx:et.speed*(Math.random()>0.5?1:-1),vy:0,
      hp:et.hp,maxHp:et.hp,
      atk:et.atk,
      onGround:false,
      type:et.type,
      emoji:et.emoji,
      color:et.color,
      dead:false,
      deathTimer:0,
      shootTimer:Math.random()*120,
      patrol:true,
      startX:400+j*220,
      gold:et.gold,
      xp:et.xp,
      flash:0
    });
  }
}

function getEnemyTypes(ch){
  var base=[];
  var diff=Math.min(ch,20);
  if(ch<=50){
    base=[
      {type:'goblin',emoji:'👺',color:'#2ecc71',w:28,h:36,hp:30+diff*8,atk:4+diff,speed:1.5+diff*0.1,gold:8+ch,xp:15+ch,shoot:false},
      {type:'wolf',emoji:'🐺',color:'#95a5a6',w:32,h:30,hp:20+diff*6,atk:6+diff,speed:2.5+diff*0.15,gold:6+ch,xp:12+ch,shoot:false}
    ];
  } else if(ch<=100){
    base=[
      {type:'giant',emoji:'🗿',color:'#7f8c8d',w:44,h:52,hp:80+diff*12,atk:8+diff,speed:1+diff*0.05,gold:15+ch,xp:25+ch,shoot:false},
      {type:'eagle',emoji:'🦅',color:'#e67e22',w:32,h:28,hp:40+diff*8,atk:10+diff,speed:3+diff*0.1,gold:12+ch,xp:20+ch,shoot:true}
    ];
  } else if(ch<=150){
    base=[
      {type:'dragon',emoji:'🐉',color:'#e74c3c',w:48,h:44,hp:120+diff*15,atk:14+diff,speed:1.5+diff*0.08,gold:20+ch,xp:35+ch,shoot:true},
      {type:'fire',emoji:'🔥',color:'#e67e22',w:28,h:32,hp:60+diff*10,atk:12+diff,speed:2+diff*0.1,gold:15+ch,xp:28+ch,shoot:true}
    ];
  } else if(ch<=200){
    base=[
      {type:'vampire',emoji:'🧛',color:'#9b59b6',w:36,h:44,hp:150+diff*18,atk:16+diff,speed:2+diff*0.1,gold:25+ch,xp:40+ch,shoot:true},
      {type:'skeleton',emoji:'💀',color:'#bdc3c7',w:30,h:42,hp:100+diff*12,atk:12+diff,speed:1.8+diff*0.1,gold:20+ch,xp:35+ch,shoot:false}
    ];
  } else {
    base=[
      {type:'robot',emoji:'🤖',color:'#3498db',w:44,h:48,hp:200+diff*20,atk:20+diff,speed:2.5+diff*0.1,gold:35+ch,xp:50+ch,shoot:true},
      {type:'mech',emoji:'⚙️',color:'#95a5a6',w:52,h:56,hp:300+diff*25,atk:25+diff,speed:1.5+diff*0.05,gold:40+ch,xp:60+ch,shoot:true}
    ];
  }
  // Boss her 50 bölümde
  if(ch%50===0){
    base=[{type:'BOSS',emoji:['👑','🐲','🌑','🛸'][Math.floor(ch/50)-1]||'💀',color:'#f1c40f',w:64,h:64,hp:500+ch*10,atk:30+ch,speed:1.8,gold:200+ch*3,xp:200+ch*2,shoot:true}];
  }
  return base;
}

// ── SAVAŞ BUTONLARI ──
var mouse={x:0,y:0};
var attackCooldown=0;
var magicCooldown=0;
window.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
window.addEventListener('mousedown',function(e){
  if(shopOpen||lvlUpOpen||dead)return;
  if(e.button===0) meleeAttack();
  if(e.button===2) castMagic();
  e.preventDefault();
});
window.addEventListener('contextmenu',function(e){e.preventDefault();});

function meleeAttack(){
  if(attackCooldown>0)return;
  var range=80;
  var dir=mouse.x>P.x+C.getBoundingClientRect().left-CAM.x?1:-1;
  attackCooldown=18;
  // Görsel efekt
  particles.push({x:P.x+dir*40,y:P.y-P.h/2,vx:dir*3,vy:-1,life:15,color:'#e74c3c',size:18,type:'slash'});
  spawnFloatText('⚔️',P.x,P.y-60,'#e74c3c');
  // Düşmanlara hasar
  enemies.forEach(function(e){
    if(e.dead)return;
    var dist=Math.abs((e.x+e.w/2)-(P.x));
    if(dist<range+e.w/2){
      var dmg=Math.max(1,P.atk+(P.equip.w?P.equip.w.atk:0)-Math.floor(e.atk*0.2)+Math.floor(Math.random()*6));
      var crit=P.skills.indexOf('s5')!==-1&&Math.random()<0.25;
      if(crit){dmg*=3;}
      e.hp-=dmg;
      e.flash=8;
      e.vx+=dir*5;
      spawnFloatText((crit?'💥 CRIT! ':'')+dmg,e.x+e.w/2,e.y-20,'#ff6b6b',crit?28:20);
      particles.push({x:e.x+e.w/2,y:e.y,vx:dir*2,vy:-3,life:20,color:'#e74c3c',size:12,type:'blood'});
      if(e.hp<=0) killEnemy(e);
    }
  });
}

function castMagic(){
  if(magicCooldown>0||P.mp<20)return;
  P.mp-=20;
  magicCooldown=30;
  var cx=P.x;var cy=P.y-P.h/2;
  var tx=mouse.x-C.getBoundingClientRect().left+CAM.x;
  var ty=mouse.y+CAM.y;
  var dx=tx-cx;var dy=ty-cy;
  var len=Math.sqrt(dx*dx+dy*dy);
  var spd=11;
  var emoji=P.skills.indexOf('s1')!==-1?'🔥':'✨';
  projectiles.push({x:cx,y:cy,vx:(dx/len)*spd,vy:(dy/len)*spd,life:80,dmg:Math.floor(P.atk*1.8+(P.equip.w?P.equip.w.atk:0)),magic:true,emoji:emoji,size:22,owner:'player'});
  spawnFloatText(emoji,cx,cy-30,'#a29bfe');
  updateMP();
}

// ── MAĞAZA ──
var SHOP_ITEMS=[
  {id:'w1',e:'🗡️',n:'Demir Kılıç',s:'+5 ATK',atk:5,def:0,hp:0,p:50,type:'w'},
  {id:'w2',e:'⚔️',n:'Çelik Kılıç',s:'+12 ATK',atk:12,def:0,hp:0,p:130,type:'w'},
  {id:'w3',e:'🔱',n:'Ejderha Mızrağı',s:'+22 ATK',atk:22,def:0,hp:0,p:280,type:'w'},
  {id:'w4',e:'🌟',n:'Efsanevi Kılıç',s:'+40 ATK',atk:40,def:0,hp:0,p:600,type:'w'},
  {id:'a1',e:'🧥',n:'Deri Zırh',s:'+5 DEF +10 HP',atk:0,def:5,hp:10,p:50,type:'a'},
  {id:'a2',e:'🛡️',n:'Zincir Zırh',s:'+12 DEF +20 HP',atk:0,def:12,hp:20,p:130,type:'a'},
  {id:'a3',e:'🦺',n:'Plaket Zırh',s:'+22 DEF +40 HP',atk:0,def:22,hp:40,p:280,type:'a'},
  {id:'p1',e:'🧪',n:'İksir (+30 HP)',s:'Anında kullan',atk:0,def:0,hp:30,p:30,type:'p'},
  {id:'p2',e:'💧',n:'Mana İksiri (+30 MP)',s:'Anında kullan',atk:0,def:0,mp:30,p:30,type:'p'},
];
function openShop(){
  if(dead||lvlUpOpen)return;
  shopOpen=true;
  var panel=document.getElementById('shop-panel');
  panel.style.display='block';
  var html='<div style="text-align:center;margin-bottom:10px;font-size:13px;color:#e67e22;">💰 '+P.gold+' altın</div>';
  SHOP_ITEMS.forEach(function(item){
    var isEq=(P.equip.w&&P.equip.w.id===item.id)||(P.equip.a&&P.equip.a.id===item.id);
    var can=P.gold>=item.p;
    html+='<div class="shop-item" onclick="buyItem(\''+item.id+\')" style="'+(isEq?'border-color:#27ae60;':'')+(can?'':'opacity:0.5;cursor:not-allowed;')+'">'
      +'<span style="font-size:22px;">'+item.e+'</span>'
      +'<div><div style="font-size:13px;font-weight:700;">'+item.n+'</div><div style="font-size:11px;color:#aaa;">'+item.s+'</div></div>'
      +'<span class="price">'+(isEq?'✅':'💰'+item.p)+'</span>'
      +'</div>';
  });
  document.getElementById('shop-items').innerHTML=html;
}
function closeShop(){shopOpen=false;document.getElementById('shop-panel').style.display='none';}
function buyItem(id){
  var item=null;
  for(var i=0;i<SHOP_ITEMS.length;i++){if(SHOP_ITEMS[i].id===id){item=SHOP_ITEMS[i];break;}}
  if(!item||P.gold<item.p)return;
  P.gold-=item.p;
  if(item.type==='w'){P.equip.w=item;spawnFloatText('⚔️ '+item.n,'#e67e22',P.y-60,'#e67e22');}
  else if(item.type==='a'){P.equip.a=item;P.maxHp+=item.hp;P.hp=Math.min(P.maxHp,P.hp+item.hp);P.def+=item.def;}
  else if(item.type==='p'){if(item.hp)P.hp=Math.min(P.maxHp,P.hp+(item.hp||0));if(item.mp)P.mp=Math.min(P.maxMp,P.mp+(item.mp||0));}
  openShop();updateHUD();
}

// ── LEVEL UP ──
var SKILLS_LIST=[
  {id:'s1',e:'🔥',n:'Ateş Topu',d:'Büyü hasarı x2'},
  {id:'s2',e:'⚡',n:'Çift Vuruş',d:'Melee +50% hasar'},
  {id:'s3',e:'💚',n:'Şifa',d:'Her saniye +1 HP'},
  {id:'s4',e:'🛡️',n:'Demir Deri',d:'DEF +10'},
  {id:'s5',e:'⭐',n:'Kritik',d:'%25 ihtimalle x3 hasar'},
  {id:'s6',e:'🌀',n:'Mana Akışı',d:'MP max +50'},
  {id:'s7',e:'👑',n:'Efsane Güç',d:'ATK kalıcı +20'},
  {id:'s8',e:'🌟',n:'Ölümsüzlük',d:'Ölümde 1 HP kal (1x)'},
  {id:'s9',e:'🔮',n:'Hızlı Atış',d:'Büyü cooldown yarıya'},
];
function showLevelUp(){
  lvlUpOpen=true;
  document.getElementById('lv-msg').textContent='Seviye '+P.level+'! Bir yetenek seç:';
  var available=SKILLS_LIST.filter(function(s){return P.skills.indexOf(s.id)===-1;});
  var picks=available.sort(function(){return Math.random()-0.5;}).slice(0,4);
  var html=picks.map(function(s){
    return '<div class="sk-btn" onclick="pickSkill(\''+s.id+'\')">'
      +'<div style="font-size:24px;margin-bottom:4px;">'+s.e+'</div>'
      +'<div style="font-weight:700;font-size:13px;">'+s.n+'</div>'
      +'<div style="font-size:10px;color:#aaa;margin-top:2px;">'+s.d+'</div>'
      +'</div>';
  }).join('');
  document.getElementById('skills-grid').innerHTML=html;
  document.getElementById('levelup').style.display='block';
}
function pickSkill(id){
  P.skills.push(id);
  if(id==='s4'){P.def+=10;spawnFloatTxtPlayer('🛡️ DEF +10','#74b9ff');}
  if(id==='s6'){P.maxMp+=50;P.mp=Math.min(P.maxMp,P.mp+50);spawnFloatTxtPlayer('💧 MP +50','#3498db');}
  if(id==='s7'){P.atk+=20;spawnFloatTxtPlayer('⚔️ ATK +20','#e74c3c');}
  closeLevelUp();
}
function closeLevelUp(){lvlUpOpen=false;document.getElementById('levelup').style.display='none';}
function spawnFloatTxtPlayer(txt,color){spawnFloatText(txt,P.x,P.y-80,color,18);}

// ── DÜŞMAN YÖNETİMİ ──
function killEnemy(e){
  e.dead=true;e.deathTimer=30;
  P.gold+=e.gold;P.xp+=e.xp;P.kc++;P.ws++;
  if(P.ws>P.mws)P.mws=P.ws;
  chapter=P.chapter;
  // Patron mı?
  if(e.type==='BOSS')P.bc++;
  spawnFloatText('+'+e.gold+'💰',e.x+e.w/2,e.y-10,'#f1c40f',16);
  spawnFloatText('+'+e.xp+'XP',e.x+e.w/2,e.y-30,'#a29bfe',14);
  // Konfeti
  for(var i=0;i<12;i++){
    particles.push({x:e.x+e.w/2,y:e.y,vx:(Math.random()-0.5)*8,vy:-Math.random()*6-2,life:40,color:['#f1c40f','#e74c3c','#2ecc71','#3498db'][Math.floor(Math.random()*4)],size:8,type:'particle'});
  }
  // XP kontrolü
  checkXP();
  updateHUD();
  // Tüm düşmanlar öldü mü?
  var alive=enemies.filter(function(en){return !en.dead;});
  if(alive.length===0){
    setTimeout(nextChapter,1200);
  }
}

function checkXP(){
  while(P.xp>=P.xpNext){
    P.xp-=P.xpNext;
    P.level++;
    P.xpNext=Math.floor(100*Math.pow(1.4,P.level-1));
    P.maxHp+=12;P.hp=Math.min(P.maxHp,P.hp+20);
    P.maxMp+=6;P.mp=Math.min(P.maxMp,P.mp+10);
    P.atk+=2;P.def+=1;
    spawnFloatTxtPlayer('⬆️ SEVİYE '+P.level+'!','#f1c40f');
    showLevelUp();
  }
}

function nextChapter(){
  P.chapter++;
  if(P.chapter>250){showWin();return;}
  spawnFloatTxtPlayer('✅ Bölüm '+P.chapter+' Başlıyor!','#2ecc71');
  setTimeout(function(){
    P.x=200;P.y=300;P.vx=0;P.vy=0;
    genLevel(P.chapter);
    CAM.x=0;
  },600);
}

function showWin(){
  alert('🏆 TEBRİKLER! 250 bölümü tamamladın! Efsane Robot Hediyesi 🤖');
}

// ── HUD ──
function updateHUD(){
  document.getElementById('hp-txt').textContent=P.hp+'/'+P.maxHp;
  document.getElementById('mp-txt').textContent=Math.floor(P.mp)+'/'+P.maxMp;
  document.getElementById('hp-fill').style.width=Math.max(0,(P.hp/P.maxHp)*100)+'%';
  document.getElementById('mp-fill').style.width=Math.max(0,(P.mp/P.maxMp)*100)+'%';
  document.getElementById('xp-fill').style.width=Math.max(0,(P.xp/P.xpNext)*100)+'%';
  document.getElementById('lv-txt').textContent=P.level;
  document.getElementById('gold-txt').textContent=P.gold;
  document.getElementById('ch-txt').textContent=P.chapter;
  document.getElementById('hero-icon').textContent=CHARS[P.char].emoji;
}
function updateMP(){updateHUD();}

// ── FLOAT TEXT ──
function spawnFloatText(txt,x,y,color,size){
  var el=document.createElement('div');
  el.className='float-txt';
  el.textContent=txt;
  el.style.color=color||'#fff';
  el.style.fontSize=(size||16)+'px';
  var rect=C.getBoundingClientRect();
  el.style.left=(rect.left+x-CAM.x)+'px';
  el.style.top=(rect.top+y-CAM.y)+'px';
  document.getElementById('floating-texts').appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1000);
}

// ── OYUNCU CİZİMİ ──
function drawPlayer(){
  ctx.save();
  // Gölge
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(P.x,P.y+2,P.w/2,8,0,0,Math.PI*2);ctx.fill();
  // Invincible flaş
  if(P.invincible>0&&Math.floor(P.invincible/3)%2===0){ctx.restore();return;}
  // Beden
  var ch=CHARS[P.char];
  ctx.fillStyle=P.equip.a?'#2c3e50':'#1a1a2e';
  ctx.strokeStyle=ch.color;
  ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(P.x-P.w/2,P.y-P.h,P.w,P.h,6);ctx.fill();ctx.stroke();
  // Emoji karakter
  ctx.font='28px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(ch.emoji,P.x,P.y-P.h/2);
  // Silah
  if(P.equip.w){
    ctx.font='16px serif';
    var dir=P.vx>=0?1:-1;
    ctx.fillText(P.equip.w.e,P.x+dir*22,P.y-P.h*0.3);
  }
  // Saldırı efekti
  if(attackCooldown>12){
    ctx.font='24px serif';
    var d2=mouse.x>P.x+(C.getBoundingClientRect().left||0)-CAM.x?1:-1;
    ctx.fillText('⚡',P.x+d2*45,P.y-P.h*0.5);
  }
  ctx.restore();
}

// ── DÜŞMAN ÇİZİMİ ──
function drawEnemy(e){
  if(e.dead){
    if(e.deathTimer>0){
      ctx.save();
      ctx.globalAlpha=e.deathTimer/30;
      ctx.font=(28+((30-e.deathTimer)*2))+'px serif';
      ctx.textAlign='center';
      ctx.fillText(e.emoji,e.x+e.w/2,e.y);
      ctx.restore();
    }
    return;
  }
  ctx.save();
  // Flash efekti
  if(e.flash>0){ctx.filter='brightness(3)';}
  // Gölge
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(e.x+e.w/2,e.y+2,e.w/2,7,0,0,Math.PI*2);ctx.fill();
  // Beden
  ctx.fillStyle=e.color+'33';
  ctx.strokeStyle=e.color;
  ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(e.x,e.y-e.h,e.w,e.h,6);ctx.fill();ctx.stroke();
  // Emoji
  ctx.font=(e.type==='BOSS'?40:26)+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(e.emoji,e.x+e.w/2,e.y-e.h/2);
  ctx.restore();
  // HP Bar
  var bw=e.w+8;var bh=6;var bx=e.x-4;var by=e.y-e.h-12;
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
  var pct=Math.max(0,e.hp/e.maxHp);
  ctx.fillStyle=pct>0.5?'#27ae60':pct>0.25?'#e67e22':'#e74c3c';
  ctx.beginPath();ctx.roundRect(bx,by,bw*pct,bh,3);ctx.fill();
  // İsim (boss için)
  if(e.type==='BOSS'){
    ctx.fillStyle='#f1c40f';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText('👑 '+e.emoji+' PATRON',e.x+e.w/2,e.y-e.h-20);
  }
}

// ── PLATFORM ÇİZİMİ ──
function drawPlatform(p){
  ctx.save();
  if(p.type==='ground'){
    ctx.fillStyle='#0d0d1f';
    ctx.fillRect(p.x-CAM.x,p.y-CAM.y,p.w,p.h);
    // Zemin çizgisi
    ctx.strokeStyle='#2a2a4a';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(p.x-CAM.x,p.y-CAM.y);ctx.lineTo(p.x+p.w-CAM.x,p.y-CAM.y);ctx.stroke();
  } else {
    var grd=ctx.createLinearGradient(p.x-CAM.x,p.y-CAM.y,p.x-CAM.x,p.y+p.h-CAM.y);
    grd.addColorStop(0,p.color);grd.addColorStop(1,p.color+'66');
    ctx.fillStyle=grd;
    ctx.strokeStyle=p.color+'aa';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(p.x-CAM.x,p.y-CAM.y,p.w,p.h,4);ctx.fill();ctx.stroke();
  }
  ctx.restore();
}

// ── ARKA PLAN ──
function drawBG(){
  // Gradient arka plan
  var grd=ctx.createLinearGradient(0,0,0,C.height);
  grd.addColorStop(0,'#000010');
  grd.addColorStop(0.6,'#0a0014');
  grd.addColorStop(1,'#050510');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,C.width,C.height);
  // Yıldızlar
  ctx.fillStyle='#ffffff';
  for(var i=0;i<60;i++){
    var sx=(i*137+CAM.x*0.05)%C.width;
    var sy=(i*79+CAM.y*0.05)%200;
    var ss=Math.sin(Date.now()*0.001+i)*0.5+0.8;
    ctx.globalAlpha=ss*0.4;
    ctx.fillRect(sx,sy,1.5,1.5);
  }
  ctx.globalAlpha=1;
  // Uzak dağlar
  ctx.fillStyle='#0d0d2a';
  for(var j=0;j<6;j++){
    var mx=(j*200-CAM.x*0.1)%(C.width+200)-100;
    var mh=80+j*20;
    ctx.beginPath();ctx.moveTo(mx,C.height-60);ctx.lineTo(mx+100,C.height-60-mh);ctx.lineTo(mx+200,C.height-60);ctx.fill();
  }
  // Ay
  ctx.fillStyle='#f1c40f22';
  ctx.beginPath();ctx.arc(C.width-100-CAM.x*0.02,80,45,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f1c40f11';
  ctx.beginPath();ctx.arc(C.width-100-CAM.x*0.02,80,60,0,Math.PI*2);ctx.fill();
}

// ── FİZİK GÜNCELLEME ──
var regenTimer=0;
function update(){
  if(dead||shopOpen||lvlUpOpen)return;
  // Oyuncu hareketi
  if(keys['ArrowLeft']||keys['KeyA']){P.vx-=1.2;if(P.vx<-SPEED)P.vx=-SPEED;}
  else if(keys['ArrowRight']||keys['KeyD']){P.vx+=1.2;if(P.vx>SPEED)P.vx=SPEED;}
  else{P.vx*=0.78;}
  if((keys['ArrowUp']||keys['KeyW']||keys['Space'])&&P.onGround){P.vy=JUMP;P.onGround=false;}
  P.vy+=GRAVITY;
  P.x+=P.vx;P.y+=P.vy;
  P.onGround=false;
  // Platform çarpışma
  platforms.forEach(function(pl){
    if(P.x+P.w/2>pl.x&&P.x-P.w/2<pl.x+pl.w&&P.y>pl.y&&P.y<pl.y+pl.h+P.vy+1&&P.vy>0){
      P.y=pl.y;P.vy=0;P.onGround=true;
    }
  });
  // Sınır
  if(P.x<80)P.x=80;
  if(P.y>C.height+100){P.hp-=20;P.y=200;P.x=200;P.vy=0;}
  // Kamera
  CAM.x=P.x-C.width/3;if(CAM.x<0)CAM.x=0;
  CAM.y=0;
  // Cooldownlar
  if(attackCooldown>0)attackCooldown--;
  if(magicCooldown>0)magicCooldown--;
  if(P.invincible>0)P.invincible--;
  // Regen
  regenTimer++;
  if(regenTimer%60===0){
    P.mp=Math.min(P.maxMp,P.mp+3);
    if(P.skills.indexOf('s3')!==-1)P.hp=Math.min(P.maxHp,P.hp+1);
  }
  // Düşmanlar
  enemies.forEach(function(e){
    if(e.dead){if(e.deathTimer>0)e.deathTimer--;return;}
    if(e.flash>0)e.flash--;
    // Hareket
    if(e.patrol){
      e.x+=e.vx;
      // Zemin
      var onG=false;
      platforms.forEach(function(pl){
        if(e.x+e.w>pl.x&&e.x<pl.x+pl.w&&e.y>pl.y&&e.y<pl.y+pl.h+e.vy+1&&e.vy>=0){
          e.y=pl.y;e.vy=0;onG=true;
        }
      });
      if(!onG){e.vy+=GRAVITY*0.8;}
      e.y+=e.vy;
      // Sınır kontrol
      if(e.x<e.startX-200||e.x>e.startX+200)e.vx*=-1;
      if(e.x<0)e.vx=Math.abs(e.vx);
    }
    // Oyuncuya çarpma
    if(P.invincible===0){
      var ex=e.x+e.w/2;var ey=e.y-e.h/2;
      var px=P.x;var py=P.y-P.h/2;
      if(Math.abs(ex-px)<(e.w/2+P.w/2)&&Math.abs(ey-py)<(e.h/2+P.h/2)){
        var dmg=Math.max(1,e.atk-(P.def+(P.equip.a?P.equip.a.def:0)));
        P.hp-=dmg;P.invincible=40;
        spawnFloatText('-'+dmg+'❤️',P.x,P.y-P.h-10,'#e74c3c');
        P.vx+=(P.x>e.x?1:-1)*5;P.vy=-5;
        if(P.hp<=0)playerDead();
      }
    }
    // Mermi atma
    if(e.shoot){
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=80+Math.random()*60;
        var dx=P.x-(e.x+e.w/2);var dy=(P.y-P.h/2)-(e.y-e.h/2);
        var len=Math.sqrt(dx*dx+dy*dy);
        if(len>0&&len<400){
          projectiles.push({x:e.x+e.w/2,y:e.y-e.h/2,vx:(dx/len)*5,vy:(dy/len)*5,life:80,dmg:Math.floor(e.atk*0.7),magic:false,emoji:'🔴',size:14,owner:'enemy'});
        }
      }
    }
  });
  // Mermiler
  projectiles.forEach(function(pr,i){
    pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;
    if(pr.owner==='player'){
      // Düşmana çarptı mı?
      enemies.forEach(function(e){
        if(e.dead)return;
        if(pr.life>0&&Math.abs(pr.x-(e.x+e.w/2))<e.w/2+10&&Math.abs(pr.y-(e.y-e.h/2))<e.h/2+10){
          var dmg=pr.dmg+(P.skills.indexOf('s1')!==-1?Math.floor(pr.dmg*0.8):0);
          e.hp-=dmg;e.flash=8;
          spawnFloatText(dmg,e.x+e.w/2,e.y-20,'#a29bfe',18);
          particles.push({x:e.x+e.w/2,y:e.y-e.h/2,vx:0,vy:0,life:20,color:'#8e44ad',size:20,type:'explode'});
          pr.life=0;
          if(e.hp<=0)killEnemy(e);
        }
      });
    } else {
      // Oyuncuya çarptı mı?
      if(P.invincible===0&&pr.life>0&&Math.abs(pr.x-P.x)<P.w/2+8&&Math.abs(pr.y-(P.y-P.h/2))<P.h/2+8){
        var dmg2=Math.max(1,pr.dmg-(P.def+(P.equip.a?P.equip.a.def:0)));
        P.hp-=dmg2;P.invincible=25;
        spawnFloatText('-'+dmg2+'❤️',P.x,P.y-P.h-10,'#e74c3c');
        pr.life=0;
        if(P.hp<=0)playerDead();
      }
    }
  });
  // Ölü mermileri temizle
  projectiles=projectiles.filter(function(pr){return pr.life>0;});
  // Partiküller
  particles.forEach(function(pa){
    pa.x+=pa.vx;pa.y+=pa.vy;pa.vy+=0.2;pa.life--;
  });
  particles=particles.filter(function(pa){return pa.life>0;});
  // Kolektifler
  collectibles.forEach(function(col){
    if(col.collected)return;
    if(Math.abs(col.x-P.x)<30&&Math.abs(col.y-(P.y-P.h/2))<40){
      col.collected=true;
      if(col.type==='gold'){P.gold+=10+P.chapter;spawnFloatText('+💰'+(10+P.chapter),col.x,col.y-20,'#f1c40f');}
      else{P.hp=Math.min(P.maxHp,P.hp+20);spawnFloatText('+20❤️',col.x,col.y-20,'#2ecc71');}
    }
  });
  updateHUD();
}

function playerDead(){
  dead=true;
  P.ws=0;
  if(P.skills.indexOf('s8')!==-1){
    P.hp=1;dead=false;P.invincible=60;
    P.skills=P.skills.filter(function(s){return s!=='s8';});
    spawnFloatTxtPlayer('🌟 ÖLÜMSÜZLÜK!','#f1c40f');
    return;
  }
  document.getElementById('go-msg').textContent='Bölüm '+P.chapter+' · Seviye '+P.level+' · '+P.kc+' düşman öldürdün';
  document.getElementById('gameover').style.display='flex';
}
function respawn(){
  dead=false;
  document.getElementById('gameover').style.display='none';
  P.hp=Math.floor(P.maxHp*0.6);P.mp=Math.floor(P.maxMp*0.5);
  P.x=200;P.y=300;P.vx=0;P.vy=0;P.invincible=60;
}

// ── ÇİZİM ──
function draw(){
  ctx.clearRect(0,0,C.width,C.height);
  drawBG();
  ctx.save();
  ctx.translate(-CAM.x,-CAM.y);
  // Platformlar
  platforms.forEach(function(p){
    // translate zaten yapıldı, CAM hesabını kaldır
    if(p.type==='ground'){
      ctx.fillStyle='#0d0d1f';
      ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.strokeStyle='#2a2a4a';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.w,p.y);ctx.stroke();
    } else {
      var grd=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
      grd.addColorStop(0,p.color);grd.addColorStop(1,p.color+'44');
      ctx.fillStyle=grd;ctx.strokeStyle=p.color+'88';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,4);ctx.fill();ctx.stroke();
    }
  });
  // Kolektifler
  collectibles.forEach(function(col){
    if(col.collected)return;
    ctx.font='20px serif';ctx.textAlign='center';
    var bob=Math.sin(Date.now()*0.004)*4;
    ctx.fillText(col.type==='gold'?'💰':'❤️',col.x,col.y+bob);
  });
  // Partiküller
  particles.forEach(function(pa){
    ctx.save();ctx.globalAlpha=pa.life/40;
    if(pa.type==='slash'){
      ctx.font=pa.size+'px serif';ctx.textAlign='center';ctx.fillText('⚡',pa.x,pa.y);
    } else if(pa.type==='explode'){
      ctx.font=pa.size+'px serif';ctx.textAlign='center';ctx.fillText('💥',pa.x,pa.y);
    } else {
      ctx.fillStyle=pa.color;
      ctx.beginPath();ctx.arc(pa.x,pa.y,pa.size/2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
  // Mermiler
  projectiles.forEach(function(pr){
    ctx.font=pr.size+'px serif';ctx.textAlign='center';
    ctx.fillText(pr.emoji,pr.x,pr.y);
  });
  // Düşmanlar
  enemies.forEach(function(e){drawEnemy(e);});
  // Oyuncu
  drawPlayer();
  ctx.restore();
  // Crosshair
  if(!shopOpen&&!lvlUpOpen&&!dead){
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(mouse.x,mouse.y,8,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouse.x-14,mouse.y);ctx.lineTo(mouse.x+14,mouse.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouse.x,mouse.y-14);ctx.lineTo(mouse.x,mouse.y+14);ctx.stroke();
    ctx.restore();
  }
  // Bölüm bilgisi
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.font='bold 80px serif';ctx.textAlign='center';
  ctx.fillText(P.chapter<=50?'🌲':P.chapter<=100?'🏔️':P.chapter<=150?'🌋':P.chapter<=200?'🌑':'🤖',C.width/2,C.height/2);
}

// ── OYUN DÖNGÜSÜ ──
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── BAŞLANGIÇ ──
// Karakter seçim ekranı - canvas üzerinde
function showCharSelect(){
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:300;';
  overlay.innerHTML='<div style="background:#0a0a1a;border:2px solid #2a52cc;border-radius:20px;padding:32px;text-align:center;max-width:400px;width:90%;">'
    +'<div style="font-size:48px;margin-bottom:8px;">⚔️</div>'
    +'<div style="font-size:24px;font-weight:800;color:#fff;margin-bottom:4px;">Robot Krallığı</div>'
    +'<div style="font-size:13px;color:#aaa;margin-bottom:24px;">WASD: Hareket · Sol Tık: Saldır · Sağ Tık: Büyü · E: Mağaza</div>'
    +'<div style="font-size:13px;color:#7a9aff;margin-bottom:16px;font-weight:600;">Karakterini seç:</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">'
    +CHARS.map(function(c,i){return '<button onclick="selectChar('+i+')" style="background:#1a1a2e;border:2px solid '+c.color+'44;border-radius:12px;padding:14px;cursor:pointer;color:#fff;font-size:13px;font-weight:700;transition:all 0.2s;" onmouseover="this.style.borderColor=\''+c.color+'\'" onmouseout="this.style.borderColor=\''+c.color+'44\'">'+'<div style="font-size:36px;margin-bottom:4px;">'+c.emoji+'</div><div>'+c.name+'</div></button>';}).join('')
    +'</div>'
    +'</div>';
  document.body.appendChild(overlay);
  window.selectChar=function(i){
    P.char=i;
    var base=CHARS[i];
    if(i===0){P.maxMp=100;P.mp=100;P.maxHp=80;P.hp=80;P.atk=14;}
    else if(i===1){P.maxMp=30;P.mp=30;P.maxHp=120;P.hp=120;P.atk=20;P.def=6;}
    else if(i===2){P.maxMp=60;P.mp=60;P.maxHp=100;P.hp=100;P.atk=16;}
    else{P.maxMp=20;P.mp=20;P.maxHp=140;P.hp=140;P.def=14;}
    document.body.removeChild(overlay);
    genLevel(P.chapter);
    updateHUD();
    loop();
  };
}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

showCharSelect();
</script>
